<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Admin Paneli</title>
    <style>
        /* Genel stil */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        h1 {
            background-color: #343a40;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin: 0;
        }

        .container {
            width: 80%;
            margin: 0 auto;
        }

        /* Ürün Listesi */
        .product-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .product-container h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #343a40;
        }

        .product {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #fafafa;
            position: relative;
        }

        .product h3 {
            font-size: 20px;
            margin: 0;
        }

        .product img {
            max-width: 120px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 4%; /* Görsellerin alt kısmına %4 boşluk bırak */
            margin-right: 4%; /* Görselin sağ kısmına %4 boşluk ekleyerek sola kaydırdım */
        }

        .product p {
            font-size: 16px;
            color: #555;
        }

        /* Silme Butonu */
        .delete-btn {
            background-color: #dc3545;
            color: white;
            font-size: 14px;
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            top: 1%; 
            right: 1px;
            transition: background-color 0.3s;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        /* Ürün Ekleme Formu */
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
        }

        .form-container h2 {
            font-size: 24px;
            color: #343a40;
            margin-bottom: 20px;
        }

        .form-container label {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }

        .form-container input[type="text"],
        .form-container input[type="number"],
        .form-container input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-container input[type="text"]:focus,
        .form-container input[type="number"]:focus,
        .form-container input[type="file"]:focus {
            border-color: #28a745;
            outline: none;
        }

        .form-container button {
            background-color: #28a745;
            color: white;
            font-size: 16px;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        .form-container button:hover {
            background-color: #218838;
        }

        /* Responsive Tasarım */
        @media (max-width: 768px) {
            .container {
                width: 95%;
            }

            .product {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .product img {
                max-width: 100px;
                margin-top: 10px;
                margin-right: 0; /* Sağdan boşluk kaldırıldı */
            }
        }
    </style>
</head>
<body>
    <h1>MongoDB Admin Paneli</h1>
    
    <div class="container">
        <!-- Ürün Listeleme -->
        <div class="product-container">
            <h2>Ürün Listesi</h2>
            <div id="product-list"></div> <!-- Dinamik ürünler burada listelenecek -->
        </div>

        <!-- Ürün Ekleme Formu -->
        <div class="form-container">
            <h2>Yeni Ürün Ekle</h2>
            <form id="add-product-form" enctype="multipart/form-data">
                <label for="product_name">Ürün Adı</label>
                <input type="text" id="product_name" name="product_name" required><br>

                <label for="product_price">Ürün Fiyatı</label>
                <input type="number" id="product_price" name="product_price" required><br>

                <label for="product_image">Ürün Resmi</label>
                <input type="file" id="product_image" name="product_image"><br>

                <button type="submit">Ürün Ekle</button>
            </form>
        </div>
    </div>

<script>
// Ürünleri listelemek için API'den veri alıyoruz
async function fetchProducts() {
    try {
        const response = await fetch('/api/products');
        const products = await response.json();

        const productList = document.getElementById('product-list');
        productList.innerHTML = ''; // Mevcut veriyi temizle

        products.forEach(product => {
            const productElement = document.createElement('div');
            productElement.classList.add('product');
            productElement.innerHTML = `
                <div>
                    <h3>${product.product_name}</h3>
                    <p><strong>Fiyat:</strong> ${product.product_price}₺</p>
                </div>
                <div><img src="${product.product_image}" alt="${product.product_name}"></div>
                <button class="delete-btn" onclick="deleteProduct('${product._id}')">Sil</button>
            `;
            productList.appendChild(productElement);
        });
    } catch (error) {
        console.error('Ürünler alınırken bir hata oluştu.', error);
    }
}

// Ürünü silmek
async function deleteProduct(productId) {
    try {
        const response = await fetch(`/api/products/${productId}`, {
            method: 'DELETE',
        });

        if (response.ok) {
            alert('Ürün başarıyla silindi, sayfayı yenileyebilirsiniz..');
            fetchProducts(); // Ürün listesi güncelleniyor
        } else {
            alert('Ürün silinirken bir hata oluştu');
        }
    } catch (error) {
        console.error('Silme işlemi sırasında bir hata oluştu', error);
        alert('Silme işlemi sırasında bir hata oluştu');
    }
}

// Yeni eklenen ürünü tabloya eklemek
async function addProductToDatabase(product) {
    const formData = new FormData();
    formData.append('product_name', product.product_name);
    formData.append('product_price', product.product_price);
    formData.append('product_image', product.product_image);

    try {
        const response = await fetch('/api/products', {
            method: 'POST',
            body: formData,
        });

        if (response.ok) {
            const newProduct = await response.json();
            fetchProducts(); // Ürün listesi güncelleniyor
            alert('Ürün eklendi');
        } else {
            alert('Ürün Başarıyla Eklendi ! Sayfayı Yenileyebilirsiniz.');
        }
    } catch (error) {
        console.error('Veri gönderilirken bir hata oluştu:', error);
        alert('Veri gönderilirken bir hata oluştu.');
    }
}

// Ürün ekleme formunu işleyelim
document.getElementById('add-product-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const product_name = document.getElementById('product_name').value;
    const product_price = document.getElementById('product_price').value;
    const product_image = document.getElementById('product_image').files[0];

    const product = {
        product_name,
        product_price,
        product_image,
    };

    await addProductToDatabase(product);
    document.getElementById('add-product-form').reset(); // Formu sıfırla
});

// Sayfa yüklendiğinde ürünleri listele
window.onload = fetchProducts;
</script>
</body>
</html>
